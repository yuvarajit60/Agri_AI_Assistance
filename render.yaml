# Render Blueprint — deploys the 6 lightweight backend services (everything
# except disease_kb, which needs ~3-4GB RAM for its BGE-M3 model and doesn't
# fit a free-tier plan; see docs/architecture/ROADMAP.md).
#
# Free-tier web services cannot RECEIVE private-network traffic (Render
# restriction — private networking to a free service only works outbound,
# e.g. to a database), so agri-gateway can't reach the other 5 services via
# fromService/hostport the way a paid plan could. It calls their PUBLIC
# .onrender.com URLs instead — those URLs get a random suffix assigned at
# creation, so they can't be known ahead of time and are left unset here
# (sync: false) for manual entry once every service shows a URL in the
# Render dashboard. Same reasoning for agri-farm-registry's DATABASE_URL:
# secrets/unpredictable values never belong in a committed render.yaml.

services:
  - type: web
    name: agri-crop-recommendation
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/crop_recommendation/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-weather
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/weather/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-soil
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/soil/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-gis
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/gis/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-water
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/water/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  # NOTE: heavier than the other services here — pulls in prophet + its
  # cmdstan native backend (~150-250MB installed) on top of pandas/
  # numpy/statsmodels. Unlike disease_kb's BGE-M3 (multi-GB, categorically
  # too big for free tier) this is expected to fit, but if the Render
  # build times out or the free-tier container OOMs at runtime, drop
  # `prophet` from services/market_price/requirements.txt — the service
  # automatically falls back to the statsmodels SARIMA path either way
  # (see services/market_price/app/forecasting.py), so removing prophet
  # just makes that fallback the only path instead of the primary one.
  - type: web
    name: agri-market-price
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/market_price/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-fertilizer
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/fertilizer/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-irrigation
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/irrigation/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health

  - type: web
    name: agri-farm-registry
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/farm_registry/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # set manually in the Render dashboard — a Neon/Supabase connection string

  - type: web
    name: agri-gateway
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/services/gateway/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: SOIL_SERVICE_URL
        sync: false # set manually — agri-soil's public https://....onrender.com URL
      - key: WEATHER_SERVICE_URL
        sync: false # set manually — agri-weather's public https://....onrender.com URL
      - key: CROP_SERVICE_URL
        sync: false # set manually — agri-crop-recommendation's public https://....onrender.com URL
      - key: GIS_SERVICE_URL
        sync: false # set manually — agri-gis's public https://....onrender.com URL
      - key: FARM_REGISTRY_URL
        sync: false # set manually — agri-farm-registry's public https://....onrender.com URL
      - key: WATER_SERVICE_URL
        sync: false # set manually — agri-water's public https://....onrender.com URL
      - key: MARKET_SERVICE_URL
        sync: false # set manually — agri-market-price's public https://....onrender.com URL
      - key: FERTILIZER_SERVICE_URL
        sync: false # set manually — agri-fertilizer's public https://....onrender.com URL
      - key: IRRIGATION_SERVICE_URL
        sync: false # set manually — agri-irrigation's public https://....onrender.com URL
