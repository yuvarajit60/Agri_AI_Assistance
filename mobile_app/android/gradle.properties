org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin's incremental compiler tries to relativize paths between the Gradle/Pub
# caches (C:) and this project (D:), which fails across Windows drive roots.
# Disabling incremental compilation avoids that crash.
kotlin.incremental=false

# This connection is slow/flaky for large sequential Maven downloads — give
# Gradle more time and more retries instead of failing the whole build on one timeout.
systemProp.http.socketTimeout=180000
systemProp.http.connectionTimeout=180000
systemProp.https.socketTimeout=180000
systemProp.https.connectionTimeout=180000
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
