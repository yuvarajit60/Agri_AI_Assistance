name: agri_ai_assistant
description: "AI-powered Agriculture Assistant for farmers — GIS, satellite, weather, soil, market and crop intelligence."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local persistence (offline-first cache, auth token storage)
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Networking (wired to the backend gateway once it exists)
  dio: ^5.7.0
  geolocator: ^13.0.2
  image_picker: ^1.1.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  pin_code_fields: ^8.0.1
  flutter_svg: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  # Bundled locally (not fetched via google_fonts at runtime) so the app
  # never depends on network access just to render text — see
  # docs/architecture/ARCHITECTURE.md's offline-tolerant mobile principle.
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
          weight: 400
        - asset: assets/fonts/Inter.ttf
          weight: 500
        - asset: assets/fonts/Inter.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
